<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bradesco Private | Validação Dallas</title>
    <style>
        :root { --red: #cc092f; --gold: #c5a059; --dark: #0e0e0e; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); font-family: Arial, sans-serif; overflow: hidden; display: flex; justify-content: flex-end; }

        /* ABA LATERAL DIREITA ESPELHADA BRADESCO */
        #aba-private-v4 {
            width: 410px; height: 100vh; background: #111; z-index: 999999; 
            border-left: 2px solid var(--gold); display: flex; flex-direction: column; 
            padding: 60px 40px; box-shadow: -20px 0 70px #000; color: #fff; box-sizing: border-box;
        }

        .aba-header img { height: 30px; margin-bottom: 25px; }
        .aba-header h2 { color: var(--gold); font-size: 16px; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        .aba-header p { color: #666; font-size: 12px; margin-top: 10px; line-height: 1.6; }

        input { 
            width: 100%; padding: 20px; background: #000; border: 1px solid #333; 
            color: var(--gold); font-size: 32px; text-align: center; letter-spacing: 12px; 
            margin: 35px 0; outline: none; border-radius: 4px; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 22px; background: var(--red); color: #fff; 
            border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; 
            border-radius: 4px; font-size: 14px; 
        }

        #msg-erro { color: var(--red); font-size: 11px; margin-top: 20px; display: none; text-align: center; }
    </style>
</head>
<body>

<div id="aba-private-v4">
    <div class="aba-header">
        <img src="logo.png" alt="Bradesco Private">
        <h2 id="tit-aba">Senha de Acesso</h2>
        <p id="sub-aba">Identificação Dallas us-south requerida. Informe sua senha de 4 dígitos para acessar o fomento.</p>
    </div>

    <input type="password" id="pw-field" maxlength="4" placeholder="••••">
    <button id="btn-acao" onclick="fluxoSeguranca()">Avançar</button>
    
    <p id="msg-erro">As senhas não conferem. Reiniciando terminal...</p>
</div>

<script>
    let s1 = "";

    function fluxoSeguranca() {
        const campo = document.getElementById('pw-field');
        const valor = campo.value;

        if (valor.length === 4) {
            if (s1 === "") {
                // ETAPA 1: GRAVA SENHA E PEDE CONFIRMAÇÃO
                s1 = valor;
                document.getElementById('tit-aba').innerText = "Confirmar Senha";
                document.getElementById('sub-aba').innerText = "Repita a senha de 4 dígitos para validar a operação de segurança.";
                campo.value = "";
                document.getElementById('btn-acao').innerText = "Confirmar e Entrar";
            } else if (valor === s1) {
                // ETAPA 2: SENHAS CONFEREM -> VAI PARA O PRODUTOS.HTML (ONDE ESTÁ O SALDO IBM)
                window.location.href = "produtos.html";
            } else {
                // ERRO
                document.getElementById('msg-erro').style.display = 'block';
                setTimeout(() => { location.reload(); }, 2000);
            }
        }
    }
</script>
</body>
</html>
