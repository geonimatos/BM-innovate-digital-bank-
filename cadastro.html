<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bradesco | Cadastro Engecema Private</title>
    <!-- Identidade Visual e Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bradesco-red: #cc092f;
            --bradesco-gray: #f4f4f4;
            --text-dark: #333333;
        }
        body {
            background-color: var(--bradesco-gray);
            font-family: "Bradesco Sans", Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-top: 6px solid var(--bradesco-red);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        header { text-align: center; margin-bottom: 30px; }
        h2 { 
            color: var(--text-dark); 
            font-weight: 400; 
            text-align: center; 
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--bradesco-red); outline: none; }
        
        /* Botão Padrão Bradesco */
        .btn-bradesco {
            width: 100%;
            padding: 16px;
            background-color: var(--bradesco-red);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn-bradesco:hover { background-color: #a00725; }

        /* Tela de Sucesso */
        .success-box { display: none; text-align: center; }
        .icon-check { font-size: 60px; color: #28a745; margin-bottom: 20px; }
        
        .footer-info {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ETAPA 1: FORMULÁRIO COMPLETO (5 CAMPOS) -->
        <div id="step-register">
            <header>
                <img src="logo.png" alt="Bradesco Engecema" style="height: 45px;">
            </header>
            <h2>Realizar Cadastro</h2>
            
            <div class="form-group">
                <input type="text" id="nome" placeholder="Nome Completo">
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="E-mail">
            </div>
            <div class="form-group">
                <input type="text" id="cpf" placeholder="CPF">
            </div>
            <div class="form-group">
                <input type="password" id="senha" placeholder="Senha">
            </div>
            <div class="form-group">
                <input type="password" id="confirma-senha" placeholder="Confirmar Senha">
            </div>

            <button class="btn-bradesco" onclick="processarCadastro()">Finalizar Cadastro</button>
        </div>

        <!-- ETAPA 2: SUCESSO E DIRECIONAMENTO PRIVATE -->
        <div id="step-success" class="success-box">
            <div class="icon-check">✓</div>
            <h2>Registro Concluído</h2>
            <p style="color: #666; line-height: 1.5; margin-bottom: 30px;">
                Seu perfil Private Engecema foi ativado. Sua grade de produtos em tempo real já está disponível.
            </p>
            
            <!-- Botão que ativa o fluxo para produtos.html e Dallas -->
            <button class="btn-bradesco" onclick="window.location.href='produtos.html'">
                Acessar Interface de Produtos
            </a>
        </div>

        <div class="footer-info">Engecema Private Banking | us-south (Dallas)</div>
    </div>

    <script>
        /**
         * Lógica Unificada de Transição de Telas
         */
        function processarCadastro() {
            // Validação simples de preenchimento
            const campos = ['nome', 'email', 'cpf', 'senha', 'confirma-senha'];
            let valido = true;
            
            campos.forEach(id => {
                if(!document.getElementById(id).value) valido = false;
            });

            if(valido) {
                document.getElementById('step-register').style.display = 'none';
                document.getElementById('step-success').style.display = 'block';
                console.log("Fluxo Bradesco: Cadastro finalizado. Pronto para navegar para produtos.html");
            } else {
                alert("Por favor, preencha todos os 5 campos do formulário.");
            }
        }
    </script>

</body>
</html>
