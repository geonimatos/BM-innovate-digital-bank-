<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private - Cadastro</title>
    <!-- FAVICON: Link direto do repositório para garantir que apareça -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f0f2f5; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #da1e28; text-align: center; margin-bottom: 20px; font-size: 24px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .erro-senha { color: #da1e28; font-size: 12px; display: none; margin-bottom: 10px; font-weight: bold; }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #da1e28; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
        }
        button:hover { background-color: #b91922; }
    </style>
</head>
<body>

<form id="formCadastro">
    <h2>Engecema Private</h2>
    
    <label>Nome Completo</label>
    <input type="text" name="nome" required>

    <label>E-mail Corporativo</label>
    <input type="email" name="email" required>

    <label>CPF</label>
    <input type="text" name="cpf" required>

    <label>Crie uma Senha</label>
    <input type="password" id="senha" name="senha" required>

    <label>Confirme a Senha</label>
    <input type="password" id="confirmar_senha" required>
    <span id="msgErro" class="erro-senha">As senhas não coincidem!</span>

    <button type="submit" id="btnFinalizar">Finalizar Cadastro</button>
</form>

<script>
document.getElementById('formCadastro').onsubmit = async function(e) {
    e.preventDefault();
    
    const senha = document.getElementById('senha').value;
    const confirma = document.getElementById('confirmar_senha').value;
    
    if (senha !== confirma) {
        document.getElementById('msgErro').style.display = 'block';
        return;
    }

    const API_KEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    const DB_NAME = "cliente_engecema";
    const CLOUDANT_URL = "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";

    const formData = new FormData(this);
    const dados = Object.fromEntries(formData.entries());
    delete dados.confirmar_senha;

    try {
        const auth = btoa("apikey:" + API_KEY);

        // MODO NO-CORS: Envia o dado ignorando o bloqueio do navegador
        fetch(`${CLOUDANT_URL}/${DB_NAME}`, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
                'Authorization': 'Basic ' + auth,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dados)
        });

        // Como o modo 'no-cors' não permite ler a resposta, assumimos o envio
        alert("Solicitação enviada ao Engecema Private. Verifique seu banco de dados.");
        this.reset();

    } catch (error) {
        alert("Erro técnico. Verifique a configuração da IBM.");
    }
};
</script>

</body>
</html>
