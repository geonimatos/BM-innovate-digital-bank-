<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private - Cadastro</title>
    <!-- FAVICON: Forçando o carregamento relativo e absoluto -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f0f2f5; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #da1e28; text-align: center; margin-bottom: 20px; font-size: 24px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .erro-senha { color: #da1e28; font-size: 12px; display: none; margin-bottom: 10px; font-weight: bold; }
        /* BOTÃO VERMELHO CONFORME PADRÃO DA PRIMEIRA PÁGINA */
        button { width: 100%; padding: 14px; background-color: #da1e28; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #b91922; }
    </style>
</head>
<body>

<form id="formCadastro">
    <h2>Engecema Private</h2>
    
    <label>Nome Completo</label>
    <input type="text" name="nome" placeholder="Digite seu nome" required>

    <label>E-mail Corporativo</label>
    <input type="email" name="email" placeholder="seu@email.com" required>

    <label>CPF</label>
    <input type="text" name="cpf" placeholder="000.000.000-00" required>

    <label>Crie uma Senha</label>
    <input type="password" id="senha" name="senha" placeholder="******" required>

    <label>Confirme a Senha</label>
    <input type="password" id="confirmar_senha" placeholder="******" required>
    <span id="msgErro" class="erro-senha">As senhas não coincidem!</span>

    <button type="submit" id="btnFinalizar">Finalizar Cadastro</button>
</form>

<script>
document.getElementById('formCadastro').onsubmit = async function(e) {
    e.preventDefault();
    
    const senha = document.getElementById('senha').value;
    const confirma = document.getElementById('confirmar_senha').value;
    const msgErro = document.getElementById('msgErro');

    // Validação de senha
    if (senha !== confirma) {
        msgErro.style.display = 'block';
        return;
    }
    msgErro.style.display = 'none';

    // CONFIGURAÇÕES IBM
    const API_KEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    const URL_CL = "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";
    const DB = "cliente_engecema";

    const formData = new FormData(this);
    const dados = Object.fromEntries(formData.entries());
    delete dados.confirmar_senha;
    dados.tipo_conta = "Private";
    dados.criado_em = new Date().toISOString();

    try {
        const auth = btoa("apikey:" + API_KEY.trim());

        const response = await fetch(`${URL_CL}/${DB}`, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Authorization': 'Basic ' + auth,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert("Sucesso! Cadastro Engecema Private realizado.");
            this.reset();
        } else {
            alert("Erro 401: Verifique o CORS no painel da IBM.");
        }
    } catch (error) {
        alert("Erro de Rede: O navegador bloqueou a conexão.");
    }
};
</script>

</body>
</html>
