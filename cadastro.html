<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private - Abertura de Conta</title>
    <!-- Favicon corrigido -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #da1e28; text-align: center; margin-bottom: 25px; font-size: 26px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        #msgErro { color: #da1e28; font-size: 13px; display: none; margin-bottom: 10px; font-weight: bold; text-align: center; }
        button { width: 100%; padding: 14px; background-color: #da1e28; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #b91922; }
        
        /* Estilo do Comprovante (Invisível no início) */
        #comprovante { display: none; border: 3px solid #da1e28; padding: 25px; border-radius: 10px; text-align: left; background-color: #fff; }
        .logo-comp { display: block; margin: 0 auto 20px auto; width: 120px; }
        .data-label { color: #666; font-size: 12px; margin-top: 20px; text-align: center; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <!-- TELA 1: FORMULÁRIO -->
    <form id="formCadastro">
        <h2>Dados Cadastrais</h2>
        <label>Nome Completo</label>
        <input type="text" id="nome" required>
        <label>E-mail Corporativo</label>
        <input type="email" id="email" required>
        <label>CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" required>
        <label>Senha</label>
        <input type="password" id="senha" required>
        <label>Confirmar Senha</label>
        <input type="password" id="confirmar_senha" required>
        <div id="msgErro">As senhas não coincidem!</div>
        <button type="submit">Finalizar Cadastro</button>
    </form>

    <!-- TELA 2: COMPROVANTE DE REGISTRO -->
    <div id="comprovante">
        <img src="logo.png" class="logo-comp" alt="Logo Engecema">
        <h3 style="text-align: center; color: #da1e28;">Comprovante de Registro</h3>
        <hr>
        <p><strong>Titular:</strong> <span id="res_nome"></span></p>
        <p><strong>CPF:</strong> <span id="res_cpf"></span></p>
        <p><strong>E-mail:</strong> <span id="res_email"></span></p>
        <p><strong>Protocolo:</strong> <span id="res_proto"></span></p>
        <hr>
        <button onclick="window.print()" style="background-color: #333;">Imprimir Comprovante</button>
        <div class="data-label">Documento gerado em: <span id="res_data"></span></div>
        <button onclick="location.reload()" class="no-print" style="background: none; color: #da1e28; margin-top: 15px; font-size: 12px;">Fazer novo cadastro</button>
    </div>
</div>

<script>
document.getElementById('formCadastro').onsubmit = async function(e) {
    e.preventDefault();
    
    const senha = document.getElementById('senha').value;
    const confirma = document.getElementById('confirmar_senha').value;
    if (senha !== confirma) {
        document.getElementById('msgErro').style.display = 'block';
        return;
    }

    const dados = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        cpf: document.getElementById('cpf').value,
        proto: "EP-" + Math.floor(Math.random() * 899999 + 100000),
        data: new Date().toLocaleString('pt-BR')
    };

    const API_KEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    const URL_CL = "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";

    try {
        // Envio para IBM Cloud
        fetch(URL_CL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Authorization': 'Basic ' + btoa("apikey:" + API_KEY), 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        // TROCA DE TELA: Esconde formulário e mostra comprovante
        document.getElementById('formCadastro').style.display = 'none';
        
        document.getElementById('res_nome').innerText = dados.nome;
        document.getElementById('res_cpf').innerText = dados.cpf;
        document.getElementById('res_email').innerText = dados.email;
        document.getElementById('res_proto').innerText = dados.proto;
        document.getElementById('res_data').innerText = dados.data;
        
        document.getElementById('comprovante').style.display = 'block';

    } catch (err) {
        alert("Erro ao processar o registro.");
    }
};
</script>

</body>
</html>
