<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema - Global Banking & Invest</title>
    <style>
        :root { --emerald: #2ecc71; --dark: #27ae60; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .screen { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 6px solid var(--emerald); position: relative; }
        .brand { font-size: 28px; font-weight: 800; color: var(--emerald); text-align: center; margin-bottom: 20px; }
        
        .btn-action { background: var(--emerald); color: white; border: none; padding: 16px; border-radius: 30px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .btn-secondary { background: none; border: 2px solid var(--emerald); color: var(--emerald); padding: 10px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-secondary.active-filter { background: var(--emerald); color: white; }

        /* MÓDULO INVESTIMENTOS */
        .invest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .invest-item { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .invest-val { font-weight: 800; color: var(--dark); display: block; margin-top: 5px; }

        /* FILTROS E LISTA */
        .filter-bar { margin: 15px 0; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }
        .transacao-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f9f9f9; }
        .transacao-valor { font-weight: 800; color: #e74c3c; }
        .val-positivo { color: var(--emerald) !important; }

        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #edf2f4; border-radius: 12px; box-sizing: border-box; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
        .service-item { background: white; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #eee; font-size: 11px; font-weight: 700; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="screen-login" class="screen active">
        <div class="card" style="max-width: 400px; margin: 60px auto; border:none; text-align:center;">
            <div class="brand">Engecema</div>
            <input type="text" id="login-cpf" placeholder="CPF" maxlength="14" oninput="mascaraCPF(this)">
            <input type="password" placeholder="Senha">
            <button class="btn-action" onclick="mudarTela('screen-dash')">Entrar</button>
            <button class="btn-secondary" style="width:100%; margin-top:10px;" onclick="mudarTela('screen-cadastro')">Abrir Conta</button>
        </div>
    </div>

    <!-- DASHBOARD INTEGRAL -->
    <div id="screen-dash" class="screen">
        <div class="brand" style="text-align: left;">Engecema</div>
        
        <div class="card">
            <p style="margin:0; font-size: 14px; color: #7f8c8d;">Saldo Total Disponível</p>
            <h1 style="color:var(--dark); margin:5px 0; font-size: 32px;">R$ 12.550,00</h1>
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <span><small>Conta: </small><b>R$ 1.500</b></span>
                <span><small>Investido: </small><b style="color:var(--emerald)">R$ 11.050</b></span>
            </div>
        </div>

        <!-- MÓDULO INVESTIMENTOS -->
        <h3>Investimentos</h3>
        <div class="card" style="border-left-color: #f1c40f;">
            <div class="invest-grid">
                <div class="invest-item">
                    <small>CDB Pós-Fixado</small>
                    <span class="invest-val">R$ 8.200,00</span>
                    <small style="color:var(--emerald)">+ 12.5% aa</small>
                </div>
                <div class="invest-item">
                    <small>Ações Global</small>
                    <span class="invest-val">R$ 2.850,00</span>
                    <small style="color:#e74c3c">- 2.1% (mês)</small>
                </div>
            </div>
            <button class="btn-action" style="padding: 10px; font-size: 13px;">Novo Investimento</button>
        </div>

        <!-- EXTRATO COM FILTRAGEM -->
        <h3>Extrato Inteligente</h3>
        <div class="card" style="border-left-color: #3498db;">
            <div class="filter-bar">
                <button class="btn-secondary active-filter" onclick="filtrar('Tudo', this)">Tudo</button>
                <button class="btn-secondary" onclick="filtrar('Alimentação', this)">Alimentação</button>
                <button class="btn-secondary" onclick="filtrar('Lazer', this)">Lazer</button>
                <button class="btn-secondary" onclick="filtrar('Serviços', this)">Serviços</button>
            </div>
            
            <div id="lista-extrato">
                <!-- Itens serão filtrados aqui -->
            </div>
        </div>

        <button onclick="location.reload()" style="width:100%; background:#eee; border:none; padding:12px; border-radius:20px; cursor:pointer; margin-top:10px;">Sair</button>
    </div>

    <script>
        const dadosExtrato = [
            { nome: 'iFood Brasil', cat: 'Alimentação', data: '18 Mar', valor: -59.90 },
            { nome: 'Netflix.com', cat: 'Serviços', data: '17 Mar', valor: -55.90 },
            { nome: 'Cinema Multiplex', cat: 'Lazer', data: '16 Mar', valor: -80.00 },
            { nome: 'Rendimento CDB', cat: 'Serviços', data: '15 Mar', valor: 12.40 },
            { nome: 'Supermercado BH', cat: 'Alimentação', data: '14 Mar', valor: -342.10 }
        ];

        function mascaraCPF(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-dash') filtrar('Tudo');
        }

        function filtrar(categoria, btn) {
            if(btn) {
                document.querySelectorAll('.filter-bar .btn-secondary').forEach(b => b.classList.remove('active-filter'));
                btn.classList.add('active-filter');
            }

            const container = document.getElementById('lista-extrato');
            container.innerHTML = '';

            const filtrados = categoria === 'Tudo' ? dadosExtrato : dadosExtrato.filter(d => d.cat === categoria);

            filtrados.forEach(t => {
                container.innerHTML += `
                    <div class="transacao-item">
                        <div>
                            <div style="font-weight:bold; font-size:14px;">${t.nome}</div>
                            <div style="font-size:11px; color:#999;">${t.data} • ${t.cat}</div>
                        </div>
                        <div class="transacao-valor ${t.valor > 0 ? 'val-positivo' : ''}">
                            ${t.valor > 0 ? '+' : ''} ${t.valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
