<!-- Substituição Total para a #121 -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOME_FANTASIA_AQUI | Transações</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --primary: #0a192f; --accent: #00d2ff; --success: #00ff88; --danger: #ff4d4d; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--primary); color: #fff; text-align: center; }
        
        .main-container { padding: 20px; max-width: 400px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .balance { font-size: 2.5rem; font-weight: 800; color: var(--success); }

        /* Modal de Pix (Ação A) */
        #pix-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; padding: 40px 20px; }
        .input-pix { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #112240; color: #fff; margin-bottom: 20px; box-sizing: border-box; }
        .btn-confirm { background: var(--success); color: #000; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; border: none; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .btn-opt { background: #112240; padding: 15px; border-radius: 16px; font-size: 0.7rem; border: 1px solid #233554; }
    </style>
</head>
<body>

    <div class="main-container">
        <header style="padding: 30px 0;"><img src="logo.png" alt="Logo" style="max-width: 120px;"></header>
        
        <main class="card">
            <div style="color: #8892b0; font-size: 0.8rem;">Saldo Disponível</div>
            <div class="balance">R$ <span id="saldo">1.550,50</span></div>

            <div class="grid">
                <div class="btn-opt" onclick="abrirPix()">PIX</div>
                <div class="btn-opt" onclick="alert('Extrato: - R$ 50,00 (Mercado)')">EXTRATO</div>
                <div class="btn-opt" onclick="location.reload()">SAIR</div>
            </div>
        </main>

        <div style="margin-top: 50px; font-size: 0.7rem; color: #495670;">
            <strong>RAZAO_SOCIAL_AQUI</strong><br>
            CNPJ: 00.000.000/0001-00 | Action #121
        </div>
    </div>

    <!-- MODAL PIX -->
    <div id="pix-modal">
        <h2 style="color: var(--accent);">Transferência Pix</h2>
        <input type="text" class="input-pix" placeholder="Chave Pix (E-mail, CPF ou Celular)">
        <input type="number" id="valor-pix" class="input-pix" placeholder="Valor R$">
        <button class="btn-confirm" onclick="confirmarPix()">CONFIRMAR ENVIO</button>
        <p onclick="document.getElementById('pix-modal').style.display='none'" style="margin-top: 20px; color: var(--danger); cursor: pointer;">Cancelar</p>
    </div>

    <script>
        function abrirPix() { document.getElementById('pix-modal').style.display = 'block'; }
        
        function confirmarPix() {
            const valor = document.getElementById('valor-pix').value;
            if(!valor || valor <= 0) return alert("Insira um valor válido");
            
            let saldoAtual = 1550.50;
            let novoSaldo = saldoAtual - parseFloat(valor);
            
            // Simulação de escrita na pasta 'transacoes' do Cloudant
            alert("Pix de R$ " + valor + " enviado com sucesso!");
            document.getElementById('saldo').innerText = novoSaldo.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('pix-modal').style.display = 'none';
        }
    </script>
</body>
</html>
