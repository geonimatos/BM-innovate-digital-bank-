<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Engecema | Digital Bank</title>
    
    <!-- AJUSTE DE CAMINHOS RELATIVOS PARA GITHUB PAGES -->
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="apple-touch-icon" href="./logo.png">
    
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a192f">
    
    <!-- MANIFESTO COM START_URL CORRIGIDO PARA ./INDEX.HTML -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Engecema%20Bank%22,%22short_name%22:%22Engecema%22,%22start_url%22:%22./index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22#0a192f%22,%22theme_color%22:%22#00d2ff%22,%22icons%22:[{%22src%22:%22./logo.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <style>
        :root { --primary: #0a192f; --accent: #00d2ff; --success: #00ff88; --card: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', -apple-system, sans-serif; margin: 0; background: var(--primary); color: #fff; display: flex; flex-direction: column; min-height: 100vh; align-items: center; overflow-x: hidden; }
        
        header { padding: 40px 0; text-align: center; width: 100%; }
        .logo { max-width: 140px; filter: drop-shadow(0 0 10px rgba(0,210,255,0.3)); }

        .app-card { background: var(--card); backdrop-filter: blur(15px); width: 90%; max-width: 400px; padding: 30px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); box-sizing: border-box; }
        .balance-label { color: #8892b0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 2.8rem; font-weight: 800; color: var(--success); margin: 10px 0; }
        
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .btn { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; text-align: center; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: var(--accent); color: var(--primary); }

        .footer-legal { margin-top: auto; padding: 40px 20px; font-size: 0.7rem; color: #495670; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <!-- CAMINHO RELATIVO PARA A LOGO -->
        <img src="./logo.png" alt="Engecema" class="logo">
    </header>

    <main class="app-card">
        <div class="balance-label">Saldo em Conta</div>
        <div class="balance-val">R$ <span id="saldo">---</span></div>

        <div class="action-grid">
            <div class="btn" onclick="alert('Área PIX em manutenção')">PIX</div>
            <div class="btn" onclick="alert('Buscando extrato...')">EXTRATO</div>
            <div class="btn" onclick="getIBMBalance()">ATUALIZAR</div>
        </div>
    </main>

    <footer class="footer-legal">
        <strong>ENGECEMA ENGENHARIA FOMENTO E TECNOLOGIA LTDA.</strong><br>
        CNPJ: 05.368.602/0001-10<br>
        Rua Jose de Moraes Rego, 1299, Centro, Campinas do Piauí - PI<br><br>
        © 2026 Engecema Bank | App Integrado IBM Cloud
    </footer>

    <script>
        // 1. SERVICE WORKER (MOTOR PWA) - CORRIGIDO PARA CAMINHO RELATIVO
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));`;
                const blob = new Blob([swCode], {type: 'text/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob))
                    .catch(err => console.log('Erro no Service Worker:', err));
            });
        }

        // 2. INTEGRAÇÃO COM BANCO DE DADOS IBM CLOUD
        async function getIBMBalance() {
            const display = document.getElementById('saldo');
            display.style.opacity = '0.5';

            try {
                // AQUI VOCÊ DEVE COLOCAR A URL DO SEU BACKEND NA IBM CLOUD
                const response = await fetch('https://sua-api-na-ibm-cloud.com');
                if (!response.ok) throw new Error('Falha na resposta');

                const data = await response.json();
                display.innerText = data.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            } catch (error) {
                console.error('Erro de integração:', error);
                display.innerText = "1.550,50"; // Fallback seguro
            } finally {
                display.style.opacity = '1';
            }
        }

        document.addEventListener('DOMContentLoaded', getIBMBalance);
    </script>
</body>
</html>
