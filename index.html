<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGECEMA</title>
    <!-- Biblioteca Oficial de E-mail -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --emerald: #2ecc71; --dark: #27ae60; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .screen { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 6px solid var(--emerald); position: relative; }
        .brand { font-size: 32px; font-weight: 900; color: var(--emerald); text-align: center; margin-bottom: 20px; letter-spacing: 1px; }
        .btn-action { background: var(--emerald); color: white; border: none; padding: 16px; border-radius: 30px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .btn-secondary { background: none; border: 2px solid var(--emerald); color: var(--emerald); padding: 14px; border-radius: 30px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #edf2f4; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .token-input { text-align: center; letter-spacing: 12px; font-size: 24px; font-weight: bold; border-bottom: 3px solid var(--emerald) !important; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .service-item { background: white; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #eee; font-weight: 600; font-size: 12px; }
    </style>
</head>
<body>

    <!-- TELA LOGIN -->
    <div id="screen-login" class="screen active">
        <div class="card" style="max-width: 400px; margin: 80px auto; border:none; text-align:center;">
            <div class="brand">ENGECEMA</div>
            <input type="text" id="login-cpf" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-action" onclick="mudarTela('screen-dash')">Entrar na Conta</button>
            <button class="btn-secondary" onclick="mudarTela('screen-cadastro')">Abrir Nova Conta</button>
        </div>
    </div>

    <!-- TELA CADASTRO -->
    <div id="screen-cadastro" class="screen">
        <div class="card" style="max-width: 450px; margin: 40px auto; border-left-color: #3498db;">
            <h2 style="color:var(--emerald); text-align:center;">Seja ENGECEMA</h2>
            <input type="text" id="cad-nome" placeholder="Nome Completo">
            <input type="email" id="cad-email" placeholder="E-mail Real">
            <input type="text" id="cad-cpf" placeholder="CPF" maxlength="14" oninput="mascaraCPF(this)">
            <button class="btn-action" id="btn-cad" onclick="fluxoCadastroReal()">Cadastrar e Validar E-mail</button>
            <button class="btn-secondary" style="border:none; color:#999;" onclick="mudarTela('screen-login')">Voltar</button>
        </div>
    </div>

    <!-- TELA TOKEN -->
    <div id="screen-token" class="screen">
        <div class="card" style="max-width: 400px; margin: 80px auto; text-align: center;">
            <h2 style="color:var(--dark);">Validar Acesso</h2>
            <p id="token-msg" style="font-size: 14px; color:#666;">Verifique seu e-mail para obter o código.</p>
            <input type="text" id="input-token" class="token-input" placeholder="000000" maxlength="6">
            <button class="btn-action" onclick="validarTokenFinal()">Ativar Conta ENGECEMA</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="screen-dash" class="screen">
        <div class="brand" style="text-align:left">ENGECEMA</div>
        <div class="card">
            <p id="msg-boas-vindas" style="margin:0; font-size: 14px; color: #7f8c8d;">Olá, Usuário</p>
            <h1 id="saldo" style="color:var(--dark); margin:5px 0; font-size: 38px;">R$ 142.880,50</h1>
            <small style="color:var(--emerald)">● Global Account Verified</small>
        </div>
        <div class="services-grid">
            <div class="service-item"><span>💠</span>Pix</div>
            <div class="service-item"><span>🌍</span>Global</div>
            <div class="service-item"><span>🏦</span>Empréstimo</div>
            <div class="service-item"><span>📈</span>Investir</div>
        </div>
        <button onclick="location.reload()" class="btn-secondary" style="margin-top:20px;">Sair com Segurança</button>
    </div>

    <script>
        // INICIALIZAÇÃO - CHAVE PÚBLICA REAL
        (function() { emailjs.init("MrcSBFoZP4w8KVROL"); })();

        // IDs ATUALIZADOS CONFORME SEU E-MAIL DE TESTE
        const EMAILJS_SERVICE = "service_94e4v3d"; 
        const EMAILJS_TEMPLATE = "template_mcb6vad";

        let tokenGerado = "";

        function mascaraCPF(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function fluxoCadastroReal() {
            const nome = document.getElementById('cad-nome').value;
            const email = document.getElementById('cad-email').value;
            const btn = document.getElementById('btn-cad');

            if(!nome || !email) return alert("Por favor, preencha todos os campos.");
            
            btn.disabled = true;
            btn.innerText = "Enviando Token Real...";
            tokenGerado = Math.floor(100000 + Math.random() * 900000).toString();

            const templateParams = {
                to_name: nome,
                to_email: email,
                token: tokenGerado
            };

            emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, templateParams)
                .then(() => {
                    alert("E-mail disparado com sucesso via ENGECEMA!");
                    document.getElementById('msg-boas-vindas').textContent = "Olá, " + nome;
                    mudarTela('screen-token');
                }, (error) => {
                    console.error("Erro:", error);
                    alert("Falha técnica. Verifique se o Template ID no EmailJS está correto.");
                    btn.disabled = false;
                    btn.innerText = "Tentar novamente";
                });
        }

        function validarTokenFinal() {
            if(document.getElementById('input-token').value === tokenGerado) {
                alert("Conta Ativada com Sucesso!");
                mudarTela('screen-dash');
            } else {
                alert("Token incorreto. Verifique seu e-mail.");
            }
        }
    </script>
</body>
</html>
