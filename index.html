<script>
    // 1. CONFIGURAÇÃO DE ACESSO (IBM CLOUD)
    const API_BASE = 'https://api.engecema.ibmcloud.com';

    // 2. LÓGICA DE LOGIN REAL
    async function fazerLogin() {
        const cpf = document.getElementById('user-cpf').value.replace(/\D/g, ''); // Limpa pontos/traços
        const pass = document.getElementById('user-pass').value;
        const btn = document.querySelector('.btn-main');

        if (cpf.length < 11 || pass.length < 4) {
            alert("Por favor, preencha o CPF e a senha corretamente.");
            return;
        }

        // Estilo de "Carregando" (Feedback Visual Nubank)
        btn.innerText = "Autenticando...";
        btn.style.opacity = "0.7";
        btn.disabled = true;

        try {
            // Chamada para o seu backend na IBM Cloud
            const response = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cpf, senha: pass })
            });

            if (response.ok) {
                const data = await response.json();
                // Armazena o Token de Sessão (Segurança)
                sessionStorage.setItem('token', data.token);
                
                // Transição de Tela
                document.getElementById('screen-login').classList.remove('active');
                document.getElementById('screen-dash').classList.add('active');
                
                // Busca o saldo real do usuário autenticado
                getIBMBalance();
            } else {
                throw new Error("Credenciais Inválidas");
            }
        } catch (error) {
            console.error("Erro no Login:", error);
            alert("Erro de autenticação. Verifique seus dados ou conexão com a IBM Cloud.");
            // Fallback para teste (Remova em produção)
            // document.getElementById('screen-login').classList.remove('active');
            // document.getElementById('screen-dash').classList.add('active');
        } finally {
            btn.innerText = "Entrar no Engecema";
            btn.style.opacity = "1";
            btn.disabled = false;
        }
    }

    // 3. BUSCA DE SALDO POR TOKEN
    async function getIBMBalance() {
        const token = sessionStorage.getItem('token');
        const display = document.getElementById('saldo');
        
        try {
            const response = await fetch(`${API_BASE}/saldo`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            display.innerText = data.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        } catch (e) {
            display.innerText = "1.550,50"; // Valor de demonstração
        }
    }
</script>
