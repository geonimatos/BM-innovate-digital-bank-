<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovate | Private Bank</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .currency-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 340px; margin-bottom: 20px; }
        .currency-box { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .chart-container { background: #111; border-radius: 20px; padding: 20px; width: 100%; max-width: 340px; border: 1px solid #222; }
        .chart-line { display: flex; align-items: flex-end; justify-content: space-between; height: 100px; padding-top: 20px; }
        .bar { width: 30px; background: #27ae60; border-radius: 5px 5px 0 0; position: relative; }
        .bar::after { content: ''; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; color: #888; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 30px;">
        <div style="font-size: 2.2rem; font-weight: bold; color: #27ae60;">R$ 1.537,02</div>
        <small style="color: #888;">Crescimento de 14.90% a.a.</small>
    </div>

    <!-- Conversor Multi-Moeda -->
    <div class="currency-grid">
        <div class="currency-box">🇺🇸 USD <div style="font-weight: bold; color: #27ae60; margin-top: 5px;">$ 301.37</div></div>
        <div class="currency-box">🇪🇺 EUR <div style="font-weight: bold; color: #27ae60; margin-top: 5px;">€ 279.45</div></div>
    </div>

    <!-- Gráfico de Investimentos -->
    <div class="chart-container">
        <small style="color: #888; text-transform: uppercase; font-size: 0.7rem;">Evolução do Patrimônio (7d)</small>
        <div class="chart-line">
            <div class="bar" style="height: 60%;"></div>
            <div class="bar" style="height: 65%;"></div>
            <div class="bar" style="height: 70%;"></div>
            <div class="bar" style="height: 75%;"></div>
            <div class="bar" style="height: 85%;"></div>
            <div class="bar" style="height: 95%;"></div>
            <div class="bar" style="height: 100%; background: #fff; box-shadow: 0 0 10px #27ae60;"></div>
        </div>
    </div>
</body>
</html>
