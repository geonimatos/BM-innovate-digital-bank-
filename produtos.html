<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bradesco Private | Internet Banking</title>
    <style>
        :root {
            --bradesco-red: #cc092f;
            --private-gold: #c5a059;
            --bg-dark: #0e0e0e;
            --white: #ffffff;
        }

        /* 1. HEADER ESPELHADO BRADESCO PRIVATE */
        .top-nav {
            background-color: var(--bradesco-red);
            height: 4px;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 2000;
        }

        header {
            background: #000;
            border-bottom: 1px solid var(--private-gold);
            padding: 10px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 4px;
            z-index: 1000;
        }

        .user-profile {
            display: flex;
            align-items: center;
            color: var(--private-gold);
            font-size: 12px;
            text-transform: uppercase;
        }

        /* 2. MENU LATERAL DE SERVIÇOS (ESPELHAMENTO) */
        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        .side-menu {
            background: #151515;
            padding: 30px 20px;
            border-right: 1px solid #333;
        }

        .side-menu ul { list-style: none; padding: 0; }
        .side-menu li {
            padding: 15px 0;
            border-bottom: 1px solid #222;
            font-size: 13px;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
        }
        .side-menu li:hover { color: var(--private-gold); }

        /* 3. ÁREA DE CONTEÚDO (DALLAS ENGINE) */
        .content-area { padding: 40px; background: var(--bg-dark); }

        /* REUTILIZANDO SEUS CARDS PREMIUM */
        .summary-card {
            background: #1c1c1c;
            padding: 25px;
            border-left: 4px solid var(--private-gold);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="top-nav"></div>

<header>
    <img src="logo.png" alt="Bradesco Private" style="height: 35px;">
    <div class="user-profile">
        <span>Olá, Cliente Private | Ag: 0001 | Conta: 123456-7</span>
        <button style="margin-left:20px; background:none; border:1px solid var(--private-gold); color:var(--private-gold); padding:5px 15px; cursor:pointer;">SAIR</button>
    </div>
</header>

<div class="main-layout">
    <!-- MENU LATERAL BRADESCO -->
    <aside class="side-menu">
        <ul>
            <li onclick="location.href='index.html'">PÁGINA INICIAL</li>
            <li onclick="location.href='admin.html'">GESTÃO PATRIMONIAL</li>
            <li onclick="location.href='cadastro.html'">MEUS DADOS</li>
            <li>INVESTIMENTOS</li>
            <li>CÂMBIO & FOMENTO</li>
            <li>CARTÕES BLACK</li>
        </ul>
    </aside>

    <!-- SEU DASHBOARD INTEGRADO -->
    <main class="content-area">
        <div id="session-status" style="color: var(--private-gold); font-size: 10px; margin-bottom: 20px;">● SESSÃO SEGURA: DALLAS US-SOUTH</div>
        
        <div class="summary-card">
            <span>Saldo Consolidado</span>
            <h2 id="saldo-corrente" style="color: var(--private-gold); font-size: 38px;">R$ 0,00</h2>
        </div>

        <!-- Inclusão do seu Card de PIX e outros elementos -->
        <div id="card-pix" class="bank-card" style="background:#1c1c1c; padding:30px; border:1px solid #333;">
            <h4 style="color:white;">TRANSFERÊNCIAS PIX</h4>
            <p style="color:#666;">Canal exclusivo para fomento ativo.</p>
            <button id="btn-pix" style="width:100%; padding:15px; background:var(--private-gold); border:none; font-weight:bold; cursor:pointer;">ACESSAR SISTEMA</button>
        </div>
    </main>
</div>

<script>
    // INTEGRAÇÃO COM O SEU CLOUDANT
    const API_ENDPOINT = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';

    async function updateDashboard() {
        try {
            const response = await fetch(API_ENDPOINT);
            const result = await response.json();
            const docs = result.rows.map(row => row.doc);

            // Soma dos valores do banco 'transações'
            let total = 0;
            docs.forEach(d => { if(d.valor) total += parseFloat(d.valor); });

            document.getElementById('saldo-corrente').innerText = total > 0 ? 
                `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}` : 
                'R$ 1.250.000,00';
            
        } catch (e) {
            console.log("Erro de sincronização Cloudant");
        }
    }
    updateDashboard();
</script>

</body>
</html>
