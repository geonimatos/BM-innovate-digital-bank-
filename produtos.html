<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bradesco Private | Validação de Segurança</title>
    <style>
        :root {
            --bradesco-red: #cc092f;
            --private-gold: #c5a059;
            --bg-dark: #0e0e0e;
            --card-gray: #1c1c1c;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); font-family: Arial, sans-serif; overflow: hidden; }

        /* TELA DE SENHA (A ABA QUE FALTAVA) */
        #aba-senha {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .caixa-validacao {
            background: #111; padding: 45px; border-top: 5px solid var(--bradesco-red);
            width: 380px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,1);
        }

        .caixa-validacao h2 { color: var(--private-gold); font-size: 14px; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }

        input[type="password"] {
            width: 100%; padding: 18px; background: #222; border: 1px solid #333;
            color: var(--private-gold); text-align: center; font-size: 22px; margin-bottom: 25px; border-radius: 4px;
        }

        .btn-entrar {
            width: 100%; padding: 18px; background: var(--bradesco-red); color: white;
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px;
        }

        /* PAINEL DE GESTÃO (OCULTO ATÉ A SENHA SER DIGITADA) */
        #painel-dallas { display: none; padding-top: 80px; }

        header {
            background: #000; border-bottom: 1px solid var(--private-gold);
            padding: 15px 50px; display: flex; justify-content: space-between;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .card-patrimonio {
            background: var(--card-gray); padding: 50px; margin: 40px;
            border-left: 5px solid var(--private-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-patrimonio h1 { color: var(--private-gold); font-size: 48px; margin: 10px 0; font-weight: 300; }
    </style>
</head>
<body>

<!-- 1. INTERCEPTAÇÃO: ABA DE SENHA -->
<div id="aba-senha">
    <div class="caixa-validacao">
        <img src="logo.png" alt="Bradesco Private" style="height: 35px; margin-bottom: 25px;">
        <h2>Digite sua Senha de 4 Dígitos</h2>
        <input type="password" id="campo-senha" placeholder="••••" maxlength="4">
        <button class="btn-entrar" onclick="liberarAcesso()">Acessar Conta</button>
        <p id="msg-erro" style="color: #ff4444; font-size: 12px; margin-top: 15px; display: none;">Senha inválida para este terminal.</p>
    </div>
</div>

<!-- 2. PAINEL DE GESTÃO REAL -->
<div id="painel-dallas">
    <header>
        <img src="logo.png" alt="Bradesco Private" style="height: 35px;">
        <div style="color: var(--private-gold); font-size: 11px; font-weight: bold;">● CONEXÃO SEGURA: DALLAS ENGINE</div>
    </header>

    <div class="card-patrimonio">
        <span style="color: #777; text-transform: uppercase; font-size: 12px; letter-spacing: 2px;">Patrimônio sob Gestão (Consolidado)</span>
        <h1 id="valor-ibm">R$ 1.250.000,00</h1>
    </div>
</div>

<script>
    // FUNÇÃO QUE LIBERA O PAINEL
    function liberarAcesso() {
        const senha = document.getElementById('campo-senha').value;
        
        // Simulação de validação (coloque a senha que desejar para o teste)
        if (senha.length >= 4) { 
            document.getElementById('aba-senha').style.display = 'none';
            document.getElementById('painel-dallas').style.display = 'block';
            document.body.style.overflow = 'auto';
            conectarIBM(); // Só inicia a conexão com a IBM após a senha
        } else {
            document.getElementById('msg-erro').style.display = 'block';
        }
    }

    // CONEXÃO COM O CLOUDANT
    const API_URL = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';

    async function conectarIBM() {
        try {
            const res = await fetch(API_URL);
            const json = await res.json();
            const documentos = json.rows.map(r => r.doc);

            let somaTotal = 0;
            documentos.forEach(d => { if(d.valor) somaTotal += parseFloat(d.valor); });

            if (somaTotal > 0) {
                document.getElementById('valor-ibm').innerText = `R$ ${somaTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            }
        } catch (e) {
            console.log("Mantendo valor de reserva (Dallas Default)");
        }
    }
</script>

</body>
</html>
