<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema Private | Finalizar Cadastro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --gold: #c5a059;
            --bg: #1a1a1a;
            --white: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: "Bradesco Sans", Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .confirmation-box {
            background: #2d2d2d;
            padding: 50px;
            border: 1px solid var(--gold);
            border-radius: 4px;
            max-width: 500px;
        }
        h1 { color: var(--gold); font-weight: 300; margin-bottom: 20px; }
        p { color: #ccc; margin-bottom: 30px; line-height: 1.6; }
        
        .btn-finalizar {
            display: inline-block;
            padding: 15px 40px;
            background-color: var(--gold);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-finalizar:hover {
            background-color: #b08d4a;
            transform: scale(1.05);
        }
        .footer-logo {
            margin-top: 30px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="confirmation-box">
    <div class="icon-success" style="font-size: 50px; color: var(--gold); margin-bottom: 20px;">✓</div>
    <h1>Cadastro Concluído</h1>
    <p>Seu perfil de investidor Private foi configurado com sucesso. Agora você tem acesso exclusivo à nossa grade de produtos em tempo real.</p>

    <!-- BOTÃO DEFINITIVO DE REDIRECIONAMENTO -->
    <a href="produtos.html" class="btn-finalizar">
        Acessar Interface de Produtos
    </a>

    <div class="footer-logo">
        <img src="logo.png" alt="Engecema Private" style="height: 40px;">
    </div>
</div>

<script>
    // Log de auditoria para o IBM Cloud Pipeline
    console.log("Fluxo de Cadastro Finalizado. Aguardando navegação para produtos.html");
</script>

</body>
</html>
