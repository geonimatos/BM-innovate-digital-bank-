<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bradesco Private | Gestão de Ativos</title>
    <style>
        body { background:#0e0e0e; color:#fff; font-family:Arial; margin:0; }
        .card { background:#1c1c1c; padding:60px; margin:100px auto; max-width:900px; border-left:6px solid #c5a059; box-shadow:0 15px 40px #000; }
        h1 { color:#c5a059; font-size:52px; margin:15px 0; font-weight:300; }
    </style>
</head>
<body>
    <div class="card">
        <span style="color:#555; text-transform:uppercase; font-size:11px; letter-spacing:3px;">Patrimônio Consolidado</span>
        <h1 id="valor-ibm">R$ 1.250.000,00</h1>
    </div>
    <script>
        async function conectarIBM() {
            try {
                const res = await fetch('https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud');
                const data = await res.json();
                let total = 0;
                data.rows.forEach(r => { if(r.doc.valor) total += parseFloat(r.doc.valor); });
                if(total > 0) document.getElementById('valor-ibm').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            } catch(e) { console.log("Dallas Offline"); }
        }
        conectarIBM();
    </script>
</body>
</html>
