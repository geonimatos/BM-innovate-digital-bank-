<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private | Validação Digital</title>
    <style>
        /* BLOQUEIO TOTAL E FORÇADO DA ABA LATERAL */
        #aba-senha-obrigatoria {
            position: fixed !important;
            top: 0 !important;
            right: 0 !important;
            width: 400px !important;
            height: 100vh !important;
            background: #111111 !important;
            z-index: 9999999 !important; /* Acima de qualquer elemento */
            border-left: 2px solid #c5a059 !important;
            display: flex !important;
            flex-direction: column !important;
            padding: 60px 40px !important;
            box-shadow: -20px 0 60px #000 !important;
            color: #ffffff !important;
            font-family: Arial, sans-serif !important;
        }

        body { background: #000; margin: 0; overflow: hidden; }
        
        .input-private {
            width: 100%; padding: 20px; background: #000; border: 1px solid #333;
            color: #c5a059; font-size: 32px; text-align: center; letter-spacing: 12px;
            margin: 30px 0; outline: none;
        }

        .btn-private {
            width: 100%; padding: 22px; background: #cc092f; color: #fff;
            border: none; font-weight: bold; text-transform: uppercase; cursor: pointer;
        }

        /* PAINEL (INVISÍVEL ATÉ A SENHA) */
        #painel-dallas { display: none; padding: 100px 50px; }
    </style>
</head>
<body>

<!-- ABA DE SENHA LATERAL (A QUE DEVE APARECER) -->
<div id="aba-senha-obrigatoria">
    <img src="logo.png" style="height: 30px; margin-bottom: 25px; width: fit-content;">
    <h2 style="color: #c5a059; font-size: 16px; text-transform: uppercase;">Senha de Acesso</h2>
    <p style="color: #666; font-size: 13px; line-height: 1.6;">
        Terminal Dallas (us-south).<br>Informe a senha de 4 dígitos para identificação.
    </p>

    <input type="password" id="pw-private" class="input-private" maxlength="4" placeholder="••••">
    
    <button class="btn-private" onclick="liberarSistema()">Confirmar Acesso</button>
    
    <p id="msg-erro" style="color: #cc092f; font-size: 11px; margin-top: 25px; display: none; text-align: center;">
        Acesso não autorizado para este terminal.
    </p>
</div>

<!-- PAINEL DE GESTÃO -->
<div id="painel-dallas">
    <div style="background: #1c1c1c; padding: 60px; border-left: 5px solid #c5a059;">
        <span style="color: #555; text-transform: uppercase; font-size: 11px;">Patrimônio Consolidado</span>
        <h1 id="saldo-ibm" style="color: #c5a059; font-size: 52px; font-weight: 300;">R$ 1.250.000,00</h1>
    </div>
</div>

<script>
    function liberarSistema() {
        const senha = document.getElementById('pw-private').value;
        
        // Simulação de trava (4 dígitos)
        if(senha.length === 4) {
            document.getElementById('aba-senha-obrigatoria').style.display = 'none';
            document.getElementById('painel-dallas').style.display = 'block';
            document.body.style.overflow = 'auto';
            conectarCloudant(); // Busca dados na IBM Cloud
        } else {
            document.getElementById('msg-erro').style.display = 'block';
        }
    }

    async function conectarCloudant() {
        const URL = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';
        try {
            const res = await fetch(URL);
            const data = await res.json();
            let total = 0;
            data.rows.forEach(r => { if(r.doc.valor) total += parseFloat(r.doc.valor); });
            if(total > 0) {
                document.getElementById('saldo-ibm').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            }
        } catch (e) {
            console.log("Dallas Offline");
        }
    }
</script>

</body>
</html>
